<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZOZ STORE - Painel de Edicao</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; background:#f5f5f0; color:#1a1a1a; }
.header { background:#1a1a1a; color:#fff; padding:18px 28px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.header h1 { font-size:17px; font-weight:700; letter-spacing:4px; }
.header .actions { display:flex; gap:10px; }
.btn { padding:9px 18px; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; border:none; cursor:pointer; transition:.2s; }
.btn-primary { background:#fff; color:#1a1a1a; }
.btn-primary:hover { background:#e8e8e8; }
.btn-secondary { background:transparent; color:#fff; border:1px solid #fff; }
.btn-secondary:hover { background:#fff; color:#1a1a1a; }
.btn-danger { background:#c0392b; color:#fff; }
.btn-success { background:#27ae60; color:#fff; }

.container { max-width:1200px; margin:0 auto; padding:24px; }

.tabs { display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid #ddd; background:#fff; padding:0 16px; }
.tab { padding:12px 20px; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; border:none; background:transparent; color:#999; border-bottom:2px solid transparent; }
.tab.active { color:#1a1a1a; border-bottom-color:#1a1a1a; }

.section { display:none; }
.section.active { display:block; }

.marca-selector { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.marca-btn { padding:10px 18px; border:1px solid #ddd; background:#fff; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; cursor:pointer; }
.marca-btn.active { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

.categoria-selector { display:flex; gap:6px; margin-bottom:16px; }
.cat-btn { padding:8px 14px; border:1px solid #ddd; background:#fff; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; }
.cat-btn.active { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

.add-btn { width:100%; padding:14px; background:#f0ece6; border:2px dashed #bbb; color:#666; font-size:12px; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-bottom:16px; }
.add-btn:hover { border-color:#1a1a1a; color:#1a1a1a; }

.product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
.product-card { background:#fff; border:1px solid #ddd; border-radius:6px; overflow:hidden; }
.product-card .card-header { background:#f8f8f8; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
.product-card .card-header .ref { font-size:11px; font-weight:700; letter-spacing:1px; }
.product-card .card-header .actions { display:flex; gap:5px; }
.product-card .card-header .actions button { padding:4px 10px; font-size:10px; border:none; cursor:pointer; }
.product-card .card-body { padding:14px; }
.product-card .img-preview { width:100%; height:180px; background:#e8e8e8; display:flex; align-items:center; justify-content:center; color:#999; font-size:10px; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px; position:relative; overflow:hidden; }
.product-card .img-preview img { width:100%; height:100%; object-fit:cover; }
.product-card .img-preview .detail-badge { position:absolute; bottom:5px; right:5px; background:#1a1a1a; color:#fff; font-size:9px; padding:3px 7px; }
.product-card .field { margin-bottom:8px; }
.product-card .field label { font-size:10px; color:#999; letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:2px; }
.product-card .field input, .product-card .field textarea { width:100%; padding:7px 10px; border:1px solid #ddd; font-size:13px; font-family:inherit; }
.product-card .field input:focus, .product-card .field textarea:focus { outline:none; border-color:#1a1a1a; }
.product-card .field textarea { min-height:50px; resize:vertical; }
.product-card .price-input { font-size:16px; font-weight:700; }

.toast { position:fixed; bottom:24px; right:24px; background:#1a1a1a; color:#fff; padding:14px 22px; font-size:12px; letter-spacing:1px; z-index:1000; display:none; }
.toast.show { display:block; }

.empty { text-align:center; padding:50px 20px; color:#bbb; font-size:13px; letter-spacing:1px; }

.pdf-actions { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.pdf-actions a { padding:10px 18px; background:#1a1a1a; color:#fff; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; text-decoration:none; }
.pdf-actions a:hover { background:#333; }

/* Tamanhos disponiveis por produto */
.sizes { display:flex; gap:6px; flex-wrap:wrap; }
.size-chk { display:flex; align-items:center; gap:4px; font-size:12px; font-weight:600; letter-spacing:1px; border:1px solid #ddd; padding:5px 9px; cursor:pointer; user-select:none; }
.size-chk input { margin:0; cursor:pointer; }
.size-chk:has(input:checked) { background:#1a1a1a; color:#fff; border-color:#1a1a1a; }

/* Modal de corte de imagem */
.crop-modal { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:2000; display:none; align-items:center; justify-content:center; padding:16px; }
.crop-modal.show { display:flex; }
.crop-box { background:#fff; width:100%; max-width:520px; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; }
.crop-box .crop-title { padding:12px 16px; font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; border-bottom:1px solid #eee; }
.crop-img-wrap { background:#222; max-height:60vh; }
.crop-img-wrap img { display:block; max-width:100%; }
.crop-actions { display:flex; gap:10px; justify-content:flex-end; padding:12px 16px; }
</style>
</head>
<body>
<div class="header">
  <h1>AZOZ STORE - PAINEL DE EDICAO</h1>
  <div class="actions">
    <button class="btn btn-secondary" onclick="salvarTudo()">Salvar no Banco</button>
    <button class="btn btn-primary" onclick="gerarPDFs()">Gerar PDFs</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="produtos">Produtos</button>
  <button class="tab" data-tab="looks">Looks</button>
</div>

<div class="container">
  <div id="tab-produtos" class="section active">
    <div class="pdf-actions">
      <a href="/pdf/PP" target="_blank">PDF Tamanho PP</a>
      <a href="/pdf/P" target="_blank">PDF Tamanho P</a>
      <a href="/pdf/M" target="_blank">PDF Tamanho M</a>
      <a href="/pdf/G" target="_blank">PDF Tamanho G</a>
      <a href="/pdf/GG" target="_blank">PDF Tamanho GG</a>
      <a href="/pdf/XGG" target="_blank">PDF Tamanho XGG</a>
      <a href="/preview/M" target="_blank" style="background:#666;">Preview HTML</a>
    </div>
    <div class="marca-selector" id="marcaSelector"></div>
    <div class="categoria-selector" id="categoriaSelector"></div>
    <div id="produtosContainer"></div>
  </div>

  <div id="tab-looks" class="section">
    <div id="looksContainer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal de corte de imagem -->
<div class="crop-modal" id="cropModal">
  <div class="crop-box">
    <div class="crop-title">Cortar imagem para o layout</div>
    <div class="crop-img-wrap"><img id="cropImg" src="" alt=""></div>
    <div class="crop-actions">
      <button class="btn btn-secondary" style="color:#1a1a1a;border-color:#1a1a1a;" onclick="fecharCrop()">Cancelar</button>
      <button class="btn btn-success" onclick="confirmarCrop()">Cortar e enviar</button>
    </div>
  </div>
</div>

<script>
function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }

const TAMANHOS = ['PP', 'P', 'M', 'G', 'GG', 'XGG'];
const TAMANHOS_PADRAO = TAMANHOS.join(',');

let marcas = [], categorias = [], produtos = [], looks = [];
let marcaAtual = null, categoriaAtual = null;

async function init() {
  await carregarMarcas();
  if (marcas.length) { marcaAtual = marcas[0]; await carregarCategorias(marcas[0].id); }
  await carregarLooks();
}

async function carregarMarcas() {
  const r = await fetch('/api/marcas');
  marcas = await r.json();
  const el = document.getElementById('marcaSelector');
  el.innerHTML = marcas.map(m => `<button class="marca-btn ${m.id===marcaAtual?.id?'active':''}" onclick="selecionarMarca(${m.id})">${m.nome}</button>`).join('');
}

async function carregarCategorias(marcaId) {
  const r = await fetch(`/api/categorias/${marcaId}`);
  categorias = await r.json();
  if (categorias.length) categoriaAtual = categorias[0];
  const el = document.getElementById('categoriaSelector');
  el.innerHTML = categorias.map(c => `<button class="cat-btn ${c.id===categoriaAtual?.id?'active':''}" onclick="selecionarCategoria(${c.id})">${c.nome}</button>`).join('');
  await carregarProdutos();
}

async function carregarProdutos() {
  if (!marcaAtual || !categoriaAtual) return;
  const r = await fetch(`/api/produtos/${marcaAtual.id}/${categoriaAtual.id}`);
  produtos = await r.json();
  produtos.sort((a, b) => b.id - a.id); // mais recentes primeiro no painel
  renderProdutos();
}

function selecionarMarca(id) {
  marcaAtual = marcas.find(m => m.id === id);
  carregarCategorias(id);
  renderMarcaSelector();
}

function selecionarCategoria(id) {
  categoriaAtual = categorias.find(c => c.id === id);
  renderCategoriaSelector();
  carregarProdutos();
}

function renderMarcaSelector() {
  const el = document.getElementById('marcaSelector');
  el.innerHTML = marcas.map(m => `<button class="marca-btn ${m.id===marcaAtual?.id?'active':''}" onclick="selecionarMarca(${m.id})">${m.nome}</button>`).join('');
}

function renderCategoriaSelector() {
  const el = document.getElementById('categoriaSelector');
  el.innerHTML = categorias.map(c => `<button class="cat-btn ${c.id===categoriaAtual?.id?'active':''}" onclick="selecionarCategoria(${c.id})">${c.nome}</button>`).join('');
}

function renderProdutos() {
  const container = document.getElementById('produtosContainer');
  if (!marcaAtual || !categoriaAtual) { container.innerHTML = '<div class="empty">Selecione marca e categoria</div>'; return; }

  let html = `<button class="add-btn" onclick="adicionarProduto()">+ Adicionar Produto</button>`;
  if (!produtos.length) { html += '<div class="empty">Nenhum produto</div>'; }
  else {
    html += '<div class="product-grid">';
    produtos.forEach(p => { html += renderCard(p); });
    html += '</div>';
  }
  container.innerHTML = html;
}

function renderCard(p) {
  const img = p.imagem ? `<img src="${p.imagem}" onerror="this.style.display='none'">` : '';
  const hasDetail = p.imagem_detalhe;
  const tamanhosProduto = (p.tamanhos != null ? p.tamanhos : TAMANHOS_PADRAO)
    .split(',').map(s => s.trim().toUpperCase());
  const checkboxes = TAMANHOS.map(t =>
    `<label class="size-chk"><input type="checkbox" value="${t}" ${tamanhosProduto.includes(t)?'checked':''}> ${t}</label>`
  ).join('');
  return `
    <div class="product-card" data-id="${p.id}">
      <div class="card-header">
        <span class="ref">REF: ${p.ref}</span>
        <div class="actions">
          <button class="btn-success" onclick="salvarProduto(${p.id})">Salvar</button>
          <button class="btn-danger" onclick="removerProduto(${p.id})">X</button>
        </div>
      </div>
      <div class="card-body">
        <div class="img-preview">${img}${hasDetail?'<div class="detail-badge">DETALHE</div>':''}</div>
        <div class="field"><label>Foto (cortada para o layout)</label><input type="file" accept="image/*" onchange="abrirCrop(this,${p.id},'imagem',175/240)"></div>
        <div class="field"><label>Detalhe</label><input type="file" accept="image/*" onchange="abrirCrop(this,${p.id},'imagem_detalhe',1)"></div>
        <div class="field"><label>Nome</label><input type="text" class="f-nome" value="${esc(p.nome)}"></div>
        <div class="field"><label>Descricao</label><textarea class="f-desc" placeholder="Descreva o produto (tecido, caimento, detalhes...)">${esc(p.descricao)}</textarea></div>
        <div class="field"><label>Preco</label><input type="number" step="0.01" class="f-preco price-input" value="${p.preco||0}"></div>
        <div class="field"><label>Cores</label><input type="text" class="f-cores" value="${esc((p.cores||'').replace(/,/g,', '))}"></div>
        <div class="field"><label>Tamanhos disponiveis</label><div class="sizes">${checkboxes}</div></div>
      </div>
    </div>`;
}

// ---- Corte de imagem (Cropper.js), generico via callback ----
let cropper = null;
let cropCallback = null; // recebe a URL final da imagem enviada

function abrirCropCb(input, aspect, cb) {
  const file = input.files[0];
  input.value = ''; // permite re-selecionar o mesmo arquivo depois
  if (!file) return;
  if (typeof Cropper === 'undefined') { // fallback se o CDN nao carregar: envia sem cortar
    enviarImagem(file, file.name || 'foto.jpg').then(url => { if (url) cb(url); });
    return;
  }
  cropCallback = cb;
  const reader = new FileReader();
  reader.onload = e => {
    const imgEl = document.getElementById('cropImg');
    imgEl.src = e.target.result;
    document.getElementById('cropModal').classList.add('show');
    if (cropper) cropper.destroy();
    cropper = new Cropper(imgEl, { aspectRatio: aspect, viewMode: 1, autoCropArea: 1, background: false });
  };
  reader.readAsDataURL(file);
}

function fecharCrop() {
  if (cropper) { cropper.destroy(); cropper = null; }
  document.getElementById('cropModal').classList.remove('show');
}

function confirmarCrop() {
  if (!cropper) return;
  const canvas = cropper.getCroppedCanvas({ maxWidth: 1400, maxHeight: 1400 });
  const cb = cropCallback;
  canvas.toBlob(async blob => {
    fecharCrop();
    const url = await enviarImagem(blob, 'crop.jpg');
    if (url && cb) cb(url);
  }, 'image/jpeg', 0.9);
}

async function enviarImagem(fileOrBlob, filename) {
  const fd = new FormData();
  fd.append('imagem', fileOrBlob, filename || 'foto.jpg');
  showToast('Enviando...');
  const r = await fetch('/api/upload', { method: 'POST', body: fd });
  const d = await r.json();
  if (!d.success) { showToast(d.error || 'Erro no upload'); return null; }
  return d.url;
}

// Foto de produto (usa o callback para gravar no produto)
function abrirCrop(input, id, campo, aspect) {
  abrirCropCb(input, aspect, async (url) => {
    await fetch(`/api/produto/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ [campo]: url }) });
    await carregarProdutos();
    showToast('Imagem salva!');
  });
}

// Foto de peca de look
function abrirCropPeca(input, pecaId) {
  abrirCropCb(input, 1, async (url) => {
    await fetch(`/api/peca/${pecaId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ imagem: url }) });
    await carregarLooks();
    showToast('Foto salva!');
  });
}

async function salvarProduto(id) {
  const card = document.querySelector(`.product-card[data-id="${id}"]`);
  const tamanhos = Array.from(card.querySelectorAll('.sizes input:checked')).map(c => c.value).join(',');
  const body = {
    nome: card.querySelector('.f-nome').value,
    descricao: card.querySelector('.f-desc').value,
    preco: parseFloat(card.querySelector('.f-preco').value)||0,
    cores: card.querySelector('.f-cores').value,
    tamanhos: tamanhos
  };
  await fetch(`/api/produto/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  showToast('Produto salvo!');
}

async function adicionarProduto() {
  if(!marcaAtual || !categoriaAtual) return;
  const r = await fetch('/api/produto', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({marca_id:marcaAtual.id, categoria_id:categoriaAtual.id, nome:'Novo Produto'})
  });
  const d = await r.json();
  if(d.success) { await carregarProdutos(); showToast('Adicionado: '+d.produto.ref); }
}

async function removerProduto(id) {
  if(!confirm('Remover este produto?')) return;
  await fetch(`/api/produto/${id}`, {method:'DELETE'});
  await carregarProdutos();
  showToast('Removido!');
}

let todosProdutos = []; // lista achatada de produtos, para o seletor de pecas

async function carregarLooks() {
  const r = await fetch('/api/dados');
  const d = await r.json();
  looks = d.looks || [];
  // Achata todos os produtos cadastrados para o seletor "adicionar produto ao look"
  todosProdutos = [];
  const prods = d.produtos || {};
  Object.keys(prods).forEach(marcaNome => {
    const cats = prods[marcaNome].categorias || {};
    Object.keys(cats).forEach(catNome => {
      (cats[catNome] || []).forEach(p => {
        todosProdutos.push({ ref: p.ref, marca: marcaNome, nome: p.nome, descricao: p.descricao, preco: p.preco, imagem: p.imagem });
      });
    });
  });
  renderLooks();
}

function renderLooks() {
  const el = document.getElementById('looksContainer');
  let html = `<button class="add-btn" onclick="adicionarLook()">+ Adicionar Look</button>`;
  if (!looks.length) { html += '<div class="empty">Nenhum look ainda. Clique em "+ Adicionar Look".</div>'; }
  else { html += looks.map(renderLookCard).join(''); }
  el.innerHTML = html;
}

function renderLookCard(l) {
  const options = todosProdutos.map((p, i) => `<option value="${i}">${esc(p.marca)} - ${esc(p.nome)} (${esc(p.ref)})</option>`).join('');
  const pecas = (l.pecas || []).map(renderPecaCard).join('');
  return `
    <div class="product-card look-card-adm" data-look="${l.id}" style="margin-bottom:16px;">
      <div class="card-header">
        <input class="l-nome" value="${esc(l.nome)}" style="flex:1;font-weight:700;letter-spacing:1px;border:1px solid #ddd;padding:7px 10px;margin-right:8px;">
        <div class="actions">
          <button class="btn-success" onclick="salvarLook(${l.id})">Salvar</button>
          <button class="btn-danger" onclick="removerLook(${l.id})">X</button>
        </div>
      </div>
      <div class="card-body">
        <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;">
          <select class="l-prodpicker" style="flex:1;min-width:180px;padding:8px;border:1px solid #ddd;font-size:12px;">
            <option value="">Escolher produto existente...</option>
            ${options}
          </select>
          <button class="btn btn-success" onclick="adicionarPecaDeProduto(${l.id}, this)">+ Add produto</button>
          <button class="add-btn" style="width:auto;margin:0;padding:9px 14px;" onclick="adicionarPecaManual(${l.id})">+ Peca manual</button>
        </div>
        <div class="product-grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr));">
          ${pecas || '<div class="empty">Nenhuma peca neste look</div>'}
        </div>
      </div>
    </div>`;
}

function renderPecaCard(peca) {
  const img = peca.imagem ? `<img src="${peca.imagem}" onerror="this.style.display='none'">` : '';
  return `
    <div class="product-card peca-card" data-peca="${peca.id}">
      <div class="card-body">
        <div class="img-preview" style="height:130px;">${img}</div>
        <div class="field"><label>Foto</label><input type="file" accept="image/*" onchange="abrirCropPeca(this,${peca.id})"></div>
        <div class="field"><label>REF</label><input type="text" class="p-ref" value="${esc(peca.ref)}"></div>
        <div class="field"><label>Marca</label><input type="text" class="p-marca" value="${esc(peca.marca)}"></div>
        <div class="field"><label>Nome</label><input type="text" class="p-nome" value="${esc(peca.nome)}"></div>
        <div class="field"><label>Descricao</label><textarea class="p-desc">${esc(peca.descricao)}</textarea></div>
        <div class="field"><label>Preco</label><input type="number" step="0.01" class="p-preco price-input" value="${peca.preco||0}"></div>
        <div class="actions" style="display:flex;gap:5px;">
          <button class="btn-success" style="flex:1;" onclick="salvarPeca(${peca.id})">Salvar</button>
          <button class="btn-danger" onclick="removerPeca(${peca.id})">X</button>
        </div>
      </div>
    </div>`;
}

async function adicionarLook() {
  const r = await fetch('/api/look', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome: 'NOVO LOOK' }) });
  const d = await r.json();
  if (d.success) { await carregarLooks(); showToast('Look adicionado'); }
  else { showToast(d.error || 'Erro ao adicionar look'); }
}

async function salvarLook(id) {
  const card = document.querySelector(`.look-card-adm[data-look="${id}"]`);
  const nome = card.querySelector('.l-nome').value;
  await fetch(`/api/look/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome }) });
  showToast('Look salvo');
}

async function removerLook(id) {
  if (!confirm('Remover este look e todas as suas pecas?')) return;
  await fetch(`/api/look/${id}`, { method: 'DELETE' });
  await carregarLooks(); showToast('Look removido');
}

async function adicionarPecaDeProduto(lookId, btn) {
  const sel = btn.parentElement.querySelector('.l-prodpicker');
  const idx = sel.value;
  if (idx === '') { showToast('Escolha um produto na lista'); return; }
  const p = todosProdutos[idx];
  const r = await fetch(`/api/look/${lookId}/peca`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) });
  const d = await r.json();
  if (d.success) { await carregarLooks(); showToast('Produto adicionado ao look'); }
  else { showToast(d.error || 'Erro'); }
}

async function adicionarPecaManual(lookId) {
  const r = await fetch(`/api/look/${lookId}/peca`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nome: 'Nova peca' }) });
  const d = await r.json();
  if (d.success) { await carregarLooks(); showToast('Peca adicionada'); }
  else { showToast(d.error || 'Erro'); }
}

async function salvarPeca(id) {
  const card = document.querySelector(`.peca-card[data-peca="${id}"]`);
  const body = {
    ref: card.querySelector('.p-ref').value,
    marca: card.querySelector('.p-marca').value,
    nome: card.querySelector('.p-nome').value,
    descricao: card.querySelector('.p-desc').value,
    preco: parseFloat(card.querySelector('.p-preco').value) || 0,
  };
  await fetch(`/api/peca/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  showToast('Peca salva');
}

async function removerPeca(id) {
  if (!confirm('Remover esta peca?')) return;
  await fetch(`/api/peca/${id}`, { method: 'DELETE' });
  await carregarLooks(); showToast('Peca removida');
}

async function salvarTudo() {
  const cards = document.querySelectorAll('#produtosContainer .product-card[data-id]');
  if (!cards.length) { showToast('Nenhum produto para salvar'); return; }
  for (const card of cards) { await salvarProduto(card.dataset.id); }
  showToast(`${cards.length} produto(s) salvos!`);
}
function gerarPDFs() {
  TAMANHOS.forEach((t,i) => { setTimeout(()=>window.open(`/pdf/${t}`,'_blank'), i*800); });
  showToast('Gerando PDFs...');
}
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  });
});

init();
</script>
</body>
</html>
